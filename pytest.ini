[pytest]
# ── Discovery ─────────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Async ─────────────────────────────────────────────────────────────────────
# "auto" mode: every async def test_* runs in an event loop automatically.
# No need to decorate individual tests with @pytest.mark.asyncio.
asyncio_mode = auto

# ── Output & reporting ────────────────────────────────────────────────────────
addopts =
    -ra
    --tb=short
    --strict-markers
    --strict-config

# ── Markers ───────────────────────────────────────────────────────────────────
# All markers must be registered here; unknown markers become errors
# (enforced by --strict-markers above).
markers =
    unit: fast, isolated tests — no external dependencies (DB, network, LLM)
    integration: tests that require a running PostgreSQL instance
    slow: tests expected to take > 1 s; excluded from the fast target
    benchmark: performance tests driven by pytest-benchmark
    acceptance: phase quality-gate tests — full toolchain + DB; gate the next phase

# ── Warning filters ───────────────────────────────────────────────────────────
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    # psycopg2 and sentence-transformers emit ResourceWarning on teardown
    ignore::ResourceWarning

# ── Coverage (activated via --cov flag in Makefile/CI; not always-on) ────────
# These defaults apply when --cov is passed:
#   --cov=continuum
#   --cov-report=term-missing
#   --cov-fail-under=80
