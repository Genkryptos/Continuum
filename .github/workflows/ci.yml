# =============================================================================
# .github/workflows/ci.yml — Continuum CI pipeline
# =============================================================================
#
# Jobs
# ----
#  lint    Static analysis (ruff + mypy + black/isort check) on Python 3.12.
#          Runs first — blocks the test job on failure so we don't waste
#          matrix-minutes on known bad code.
#
#  test    Full test suite on Python 3.11 and 3.12 in parallel.
#          Spins up a pgvector Postgres service container; runs unit tests,
#          then integration tests, then a combined coverage run.
#          Coverage XML uploaded to Codecov from the 3.12 leg only.
#
# Triggers
# --------
#  • Every push to main
#  • Every pull request targeting main
#
# Concurrency: one run per branch at a time; in-progress runs cancelled on
# new push so stale CI doesn't hold runner slots.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Lint job ─────────────────────────────────────────────────────────────────

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install runtime + lint tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: ruff — lint
        run: python -m ruff check continuum tests

      - name: ruff — format check
        run: python -m ruff format --check continuum tests

      - name: "type: ignore policy (no bare ignores; new ones need review)"
        run: |
          set -euo pipefail
          bare="$(grep -rnE '#[[:space:]]*type:[[:space:]]*ignore' continuum/ \
                  | grep -vE '#[[:space:]]*type:[[:space:]]*ignore\[' || true)"
          if [ -n "$bare" ]; then
            echo "$bare"
            echo "::error::Bare '# type: ignore' is banned. Use "\
                 "'# type: ignore[code]  # <reason>' and get the PR reviewed."
            exit 1
          fi
          echo "Specific # type: ignore[...] occurrences (reviewers: scrutinise any new ones):"
          grep -rnE '#[[:space:]]*type:[[:space:]]*ignore\[' continuum/ || echo "  (none)"

      - name: mypy — strict type-check (100% coverage gate)
        run: python -m mypy --strict continuum

# ── Test matrix job ───────────────────────────────────────────────────────────

  test:
    name: "Test — Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    needs: lint    # only run if lint passes

    strategy:
      fail-fast: false   # keep both matrix legs running even if one fails
      matrix:
        python-version: ["3.11", "3.12"]

    # ── PostgreSQL service container ─────────────────────────────────────────
    services:
      postgres:
        # ankane/pgvector is deprecated and frozen at pgvector 0.5.1; the
        # halfvec + HNSW migration needs >= 0.8.0. Use the official,
        # maintained image (pg16 ships pgvector 0.8.x).
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER:     myuser
          POSTGRES_PASSWORD: mypassword
          POSTGRES_DB:       mydb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U myuser -d mydb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install runtime + test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-benchmark
          # psycopg3 powers the async stores; mypy is needed by the Phase
          # acceptance gate (#9 type-coverage check). Without these the
          # gate would skip instead of enforcing.
          # [pool] extra → psycopg_pool, required by PostgresLTM's DSN pooling.
          pip install 'psycopg[binary,pool]>=3.1' mypy

      # ── Unit tests (no DB) ───────────────────────────────────────────────
      - name: Run unit tests
        run: python -m pytest tests/unit -v -m unit

      # ── Integration tests (Postgres required) ────────────────────────────
      - name: Run integration tests
        run: python -m pytest tests/integration -v -m integration
        env:
          # Fixtures read _ADMIN_DSN from conftest; this env var lets code
          # under test find the same DB without hard-coding credentials.
          CONTINUUM_DB_DSN: postgresql://myuser:mypassword@localhost:5432/mydb

      # ── Full suite + coverage ─────────────────────────────────────────────
      # The acceptance gate is excluded here: it spawns its OWN coverage
      # subprocess, so re-running it inside this coverage run would double
      # the work and nest coverage processes. It gets a dedicated step below.
      - name: Run full suite with coverage
        run: |
          python -m pytest tests \
            --ignore=tests/acceptance \
            --cov=continuum \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80 \
            -q
        env:
          CONTINUUM_DB_DSN: postgresql://myuser:mypassword@localhost:5432/mydb

      # ── Phase 0.1 quality gate ────────────────────────────────────────────
      # Runs once, after the suite. If this fails, Phase 0.2 must not begin.
      - name: Phase 0.1 acceptance gate
        run: python -m pytest tests/acceptance -v -m acceptance
        env:
          CONTINUUM_DB_DSN: postgresql://myuser:mypassword@localhost:5432/mydb

      # ── Upload coverage (3.12 only, avoids duplicate uploads) ────────────
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false   # don't block merge on Codecov outages
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
